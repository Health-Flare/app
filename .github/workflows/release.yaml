name: Release APK

# Triggers on any version tag, e.g. v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

# Flutter version kept in sync with ci.yaml — update both together.
env:
  FLUTTER_VERSION: "3.41.1"

jobs:
  build-release-apk:
    name: Build & publish release APK
    runs-on: ubuntu-latest

    # Required for github.token to create releases on GitHub.
    # Gitea ignores this block but it is harmless.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        run: |
          git clone --depth 1 --branch $FLUTTER_VERSION \
            https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: flutter pub get

      # ── Signing setup ────────────────────────────────────────────────────────
      # Add these secrets in your repository settings (Gitea or GitHub):
      #   KEYSTORE_BASE64   base64-encoded .jks / .keystore file
      #                     Generate with: base64 -i release.keystore | pbcopy
      #   STORE_PASSWORD    storePassword value from key.properties
      #   KEY_ALIAS         keyAlias value from key.properties
      #   KEY_PASSWORD      keyPassword value from key.properties
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with version tag
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/healthflare-${{ github.ref_name }}.apk

      # ── Publish ──────────────────────────────────────────────────────────────
      # github.api_url works on both platforms:
      #   GitHub → https://api.github.com
      #   Gitea  → https://<your-instance>/api/v1
      # github.token is auto-provided on both platforms.
      - name: Create or get release
        run: |
          # If the release was already created (e.g. via the GitHub UI), reuse it.
          HTTP_CODE=$(curl -s -o release.json -w "%{http_code}" \
            -H "Authorization: token ${{ github.token }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")
          if [ "$HTTP_CODE" != "200" ]; then
            curl -sf -X POST \
              -H "Authorization: token ${{ github.token }}" \
              -H "Content-Type: application/json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases" \
              -d "{
                \"tag_name\": \"${{ github.ref_name }}\",
                \"name\": \"Health Flare ${{ github.ref_name }}\",
                \"body\": \"Release ${{ github.ref_name }}\",
                \"draft\": false,
                \"prerelease\": false
              }" \
              -o release.json
          fi
          echo "Release ID: $(jq '.id' release.json)"

      # Both GitHub and Gitea return an upload_url field in the release
      # response. GitHub uses a separate upload host (uploads.github.com);
      # extracting upload_url handles this transparently on both platforms.
      - name: Upload APK to release
        run: |
          # Strip the URI template suffix {?name,label} before appending our params
          UPLOAD_URL=$(jq -r '.upload_url' release.json | sed 's/{?name,label}//')
          APK=build/app/outputs/flutter-apk/healthflare-${{ github.ref_name }}.apk
          curl -sf -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "${UPLOAD_URL}?name=healthflare-${{ github.ref_name }}.apk" \
            --data-binary "@${APK}"
