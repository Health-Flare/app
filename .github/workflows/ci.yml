name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency report — every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read

# Flutter version pinned here — update in one place when upgrading.
env:
  FLUTTER_VERSION: "3.41.1"

jobs:
  # ── 1. Dependencies ───────────────────────────────────────────────────────
  flutter-pub-get:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Check for discontinued direct packages
        run: |
          # Only fail on discontinued *direct* dependencies — transitive ones
          # (e.g. build_resolvers, build_runner_core) are outside our control.
          DIRECT=$(flutter pub outdated 2>&1 \
            | awk '/direct dependencies:/{found=1} /transitive dependencies:/{found=0} found')
          if echo "$DIRECT" | grep -q "(discontinued)"; then
            echo "❌ A direct dependency is discontinued. Run 'flutter pub outdated'."
            echo "$DIRECT" | grep "(discontinued)"
            exit 1
          fi

  # ── 2. Security audit ─────────────────────────────────────────────────────
  # dart/flutter pub audit is not available until Dart 3.5+.
  # Security advisories are checked manually via https://osv.dev until
  # the SDK constraint is relaxed to support a version that includes it.
  # This job is a placeholder to keep the pipeline structure intact.
  flutter-pub-audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: flutter-pub-get
    steps:
      - uses: actions/checkout@v5
      - name: Security audit placeholder
        run: |
          echo "ℹ️  dart pub audit requires Dart 3.5+."
          echo "    Review https://osv.dev for advisories against pubspec.lock until then."

  # ── 3. URL / offline scan ─────────────────────────────────────────────────
  url-scan:
    name: Offline integrity scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Scan for hardcoded URLs in Dart source
        run: bash scripts/check_urls.sh
      - name: Verify google_fonts is not a dependency
        run: |
          if grep -q "google_fonts" pubspec.yaml; then
            echo "❌ google_fonts found in pubspec.yaml — all fonts must be bundled as assets."
            exit 1
          fi
      - name: Verify no google_fonts imports in lib/
        run: |
          if grep -rl "package:google_fonts" lib/; then
            echo "❌ google_fonts import found in lib/. Remove it — fonts are bundled."
            exit 1
          fi

  # ── 4. Formatting ──────────────────────────────────────────────────────────
  dart-format:
    name: Formatting
    runs-on: ubuntu-latest
    needs: flutter-pub-get
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Check dart format
        run: dart format --output=none --set-exit-if-changed lib/ test/

  # ── 5. Static analysis ────────────────────────────────────────────────────
  flutter-analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    needs: flutter-pub-get
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Analyse
        run: flutter analyze --fatal-infos

  # ── 6. Tests ──────────────────────────────────────────────────────────────
  flutter-test:
    name: Tests
    runs-on: ubuntu-latest
    needs: flutter-pub-get
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Run tests
        run: flutter test --reporter=github

  # ── 7. Build ──────────────────────────────────────────────────────────────
  flutter-build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [flutter-analyze, dart-format, url-scan, flutter-pub-audit, flutter-test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build debug APK
        run: flutter build apk --debug
      - name: Archive APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ── 8. Build macOS app ────────────────────────────────────────────────────
  flutter-build-macos:
    name: Build macOS app
    runs-on: macos-latest
    needs: [flutter-analyze, dart-format, url-scan, flutter-pub-audit, flutter-test]
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build macOS app (debug)
        run: flutter build macos --debug
      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Debug
          zip -r healthflare-macos-debug.zip "Health Flare.app"
      - name: Archive macOS app
        uses: actions/upload-artifact@v6
        with:
          name: healthflare-macos-debug.zip
          path: build/macos/Build/Products/Debug/healthflare-macos-debug.zip
          retention-days: 7

  # ── 9. Build Linux app ────────────────────────────────────────────────────
  flutter-build-linux:
    name: Build Linux app
    runs-on: ubuntu-latest
    needs: [flutter-analyze, dart-format, url-scan, flutter-pub-audit, flutter-test]
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libblkid-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build Linux app (debug)
        run: flutter build linux --debug
      - name: Archive Linux bundle
        run: |
          tar -czf healthflare-linux-debug.tar.gz \
            -C build/linux/x64/debug/bundle .
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: healthflare-linux-debug.tar.gz
          path: healthflare-linux-debug.tar.gz
          retention-days: 7

  # ── 10. Build Windows app ─────────────────────────────────────────────────
  flutter-build-windows:
    name: Build Windows app
    runs-on: windows-latest
    needs: [flutter-analyze, dart-format, url-scan, flutter-pub-audit, flutter-test]
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build Windows app (debug)
        run: flutter build windows --debug
      - name: Zip Windows bundle
        run: |
          Compress-Archive -Path build/windows/x64/runner/Debug/* `
            -DestinationPath healthflare-windows-debug.zip
        shell: pwsh
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: healthflare-windows-debug.zip
          path: healthflare-windows-debug.zip
          retention-days: 7

  # ── 11. Weekly dependency report (scheduled) ──────────────────────────────
  dependency-audit:
    name: Weekly dependency report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Report outdated packages
        run: bash scripts/check_deps.sh
